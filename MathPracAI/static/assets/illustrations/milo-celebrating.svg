<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" style="overflow:visible">
  <!--
    Milo — Celebrating state
    Tilted +6°, happy eyes, sparkles
  -->
  <g transform="rotate(6, 50, 80)">
    <ellipse cx="50" cy="122" rx="26" ry="5" fill="#111118" fill-opacity="0.12"/>
    <rect x="14" y="48" width="72" height="68" rx="16" fill="#111118"/>
    <text x="50" y="97" text-anchor="middle" font-family="system-ui,sans-serif"
      font-size="28" font-weight="800" fill="white" fill-opacity="0.9">M</text>
    <rect x="22" y="32" width="56" height="10" rx="3" fill="#111118"/>
    <rect x="32" y="18" width="36" height="18" rx="5" fill="#1a1a24"/>
    <line x1="72" y1="37" x2="80" y2="52" stroke="#111118" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="80" cy="55" r="4.5" fill="#111118"/>
    <!-- Arms raised -->
    <rect x="-2" y="58" width="18" height="10" rx="5" fill="#111118" transform="rotate(-30 7 63)"/>
    <rect x="84" y="58" width="18" height="10" rx="5" fill="#111118" transform="rotate(30 93 63)"/>
    <rect x="24" y="112" width="18" height="12" rx="6" fill="#111118"/>
    <rect x="58" y="112" width="18" height="12" rx="6" fill="#111118"/>
  </g>
  <!-- Sparkles -->
  <text x="6"  y="42" font-size="14" fill="#FFD700">✦</text>
  <text x="78" y="30" font-size="10" fill="#FFD700">✦</text>
  <text x="82" y="55" font-size="8"  fill="#FFD700">✧</text>
</svg>
